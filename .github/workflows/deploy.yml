name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main  # Triggers the build when you push to the main branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Execute Build Command
        run: npm run build  # Compiles your React/Vue/Next project locally on GitHub

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/  # Change this to './build/' depending on your framework's output
          server-dir: ./public_html/
